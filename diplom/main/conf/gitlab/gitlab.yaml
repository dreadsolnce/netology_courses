global:
  hosts:
    domain: kvlpro.site  # Ваш домен
    https: true          # Если на внешнем Nginx будет SSL (рекомендуется)

  # Настройка внешнего прокси (чтобы GitLab правильно генерировал ссылки)
  ingress:
    enabled: false       # Отключаем создание Ingress-объектов внутри K8s
    configureCertmanager: false # Отключаем внутренний Cert-manager

# 1. Отключаем встроенный Nginx-Ingress контроллер
nginx-ingress:
  enabled: false

# 2. Настраиваем веб-сервис (HTTP/API) на NodePort
gitlab:
  webservice:
    service:
      type: NodePort
      nodePort: 30080 # Можно указать свой (30000-32767) или оставить пустым для автоназначения

  # 3. Настраиваем SSH (для Git через терминал) на NodePort
  gitlab-shell:
    service:
      type: NodePort
      nodePort: 30022 # Порт для SSH доступа

